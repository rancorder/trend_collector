name: 技術トレンド週次収集

on:
  schedule:
    - cron: '0 1 * * 1'   # 毎週月曜 10:00 JST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python trend_collector/collect.py

      - name: index.htmlを上書き（URL固定）
        run: |
          DATE=$(date +%Y%m%d)
          cp trend_output/report_${DATE}.html index.html
          echo "index.html更新: report_${DATE}.html"

      - name: Excelをアーティファクト保存
        uses: actions/upload-artifact@v4
        with:
          name: trend-excel-${{ github.run_number }}
          path: trend_output/*.xlsx
          retention-days: 90

      - name: push → Vercel自動デプロイ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📡 トレンドレポート更新 $(date +%Y-%m-%d)"
          git push
