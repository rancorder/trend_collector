name: 技術トレンド週次収集

on:
  schedule:
    - cron: '0 1 * * 1'   # 毎週月曜 10:00 JST
  workflow_dispatch:        # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリインストール
        run: pip install -r requirements.txt

      - name: トレンド収集実行
        run: python trend_collector/collect.py

      - name: docsに配置（URL固定）
        run: |
          mkdir -p docs/archive
          DATE=$(date +%Y%m%d)

          # ① 最新レポートを index.html として上書き（URLが変わらない）
          cp trend_output/report_${DATE}.html docs/index.html

          # ② 過去レポートは archive/ に日付付きで保管
          cp trend_output/report_${DATE}.html docs/archive/report_${DATE}.html

          # ③ アーカイブ一覧ページを自動生成
          python << 'PYEOF'
          import os, re
          from pathlib import Path

          archive_dir = Path("docs/archive")
          files = sorted(archive_dir.glob("report_*.html"), reverse=True)

          rows = ""
          for f in files:
              m = re.search(r"(\d{4})(\d{2})(\d{2})", f.name)
              if m:
                  date_str = f"{m.group(1)}-{m.group(2)}-{m.group(3)}"
                  latest = "（最新）" if f == files[0] else ""
                  rows += f'<tr><td><a href="{f.name}">{date_str} {latest}</a></td></tr>\n'

          html = f"""<!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <title>技術トレンド アーカイブ</title>
          <style>
            body {{ font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }}
            h1 {{ font-size: 18px; color: #1E3A5F; }}
            a {{ color: #1D4ED8; }}
            table {{ width: 100%; border-collapse: collapse; }}
            td {{ padding: 8px; border-bottom: 1px solid #eee; }}
          </style>
          </head>
          <body>
          <h1>📡 技術トレンド レポート一覧</h1>
          <p><a href="/">← 最新レポートを見る</a></p>
          <table>{rows}</table>
          </body>
          </html>"""

          Path("docs/archive/index.html").write_text(html, encoding="utf-8")
          print(f"アーカイブ一覧生成: {len(files)}件")
          PYEOF

      - name: Excelをアーティファクト保存
        uses: actions/upload-artifact@v4
        with:
          name: trend-excel-${{ github.run_number }}
          path: trend_output/*.xlsx
          retention-days: 90

      - name: GitHubにpush → Vercel自動デプロイ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📡 トレンドレポート更新 $(date +%Y-%m-%d)"
          git push
